# One-command Postgres for local demo
# From habitly-export/:  docker compose up -d
# Then: export DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/habitly

services:
  postgres:
    image: postgres:16-alpine
    container_name: habitly-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: habitly
    ports:
      - "5432:5432"
    volumes:
      - habitly_pg_data:/var/lib/postgresql/data

volumes:
  habitly_pg_data:
